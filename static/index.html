<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Agent - AI 助手</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🤖 Mini Agent</h1>
                <p>从零实现的 AI Agent 系统</p>
            </div>

            <!-- 会话管理 -->
            <div class="section">
                <div class="section-header">
                    <h2>💬 会话</h2>
                    <button id="btn-new-session" class="btn-icon" title="新建会话">+</button>
                </div>
                <div id="sessions-list" class="sessions-list">
                    <!-- 动态加载会话列表 -->
                </div>
            </div>

            <!-- 工具列表 -->
            <div class="section">
                <div class="section-header">
                    <h2>🔧 工具</h2>
                </div>
                <div id="tools-list" class="tools-list">
                    <!-- 动态加载工具列表 -->
                </div>
            </div>

            <!-- 系统信息 -->
            <div class="section">
                <h2>📊 系统信息</h2>
                <div id="system-info" class="system-info">
                    <!-- 动态加载 -->
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部工具栏 -->
            <header class="toolbar">
                <div class="toolbar-left">
                    <span id="current-session-id" class="session-id">未选择会话</span>
                </div>
                <div class="toolbar-right">
                    <button id="btn-toggle-trace" class="btn-secondary">📋 查看日志</button>
                    <button id="btn-clear-chat" class="btn-secondary">🗑️ 清空对话</button>
                </div>
            </header>

            <!-- 聊天消息区 -->
            <div id="chat-messages" class="chat-messages">
                <div class="welcome-message">
                    <h2>👋 欢迎使用 Mini Agent</h2>
                    <p>这是一个从零实现的 AI Agent 系统，支持：</p>
                    <ul>
                        <li>多轮对话 + 会话持久化</li>
                        <li>6 个内置工具（计算器、搜索、任务管理、文件读写、时间查询）</li>
                        <li>ReAct 循环自动推理</li>
                        <li>流式输出实时响应</li>
                    </ul>
                    <p class="hint">💡 在下方输入框开始对话吧！</p>
                </div>
            </div>

            <!-- 输入区 -->
            <div class="input-area">
                <form id="chat-form" class="chat-form">
                    <textarea
                        id="user-input"
                        class="user-input"
                        placeholder="输入消息... (Shift+Enter 换行)"
                        rows="1"
                    ></textarea>
                    <button type="submit" id="btn-send" class="btn-send">
                        <span class="send-icon">➤</span>
                    </button>
                </form>
            </div>
        </main>

        <!-- Trace 日志面板（右侧滑出） -->
        <aside id="trace-panel" class="trace-panel">
            <div class="trace-header">
                <h2>📋 执行追踪日志</h2>
                <button id="btn-close-trace" class="btn-icon">×</button>
            </div>
            <div id="trace-entries" class="trace-entries">
                <!-- 动态加载日志 -->
            </div>
        </aside>
    </div>

    <script src="/static/app.js?v=1.0.0"></script>
</body>
</html>
